version: '3.8'

# ==============================================================================
# Live VLM WebUI - Complete Stack
# ==============================================================================
# Unified docker-compose with multiple VLM backends.
# Choose your backend via profiles (backend-centric design).
#
# Available Backends:
#   - Ollama: Easy local model management (no API keys)
#   - NVIDIA NIM: Production-grade, advanced reasoning (requires NGC API key)
#   - vLLM: High-performance inference (coming soon)
#   - SGLang: Complex reasoning (coming soon)
#
# Profiles (Backend + Platform):
#   Ollama:
#     - ollama: PC (x86_64) / DGX Spark (ARM64)
#     - ollama-jetson-thor: Jetson Thor
#     - ollama-jetson-orin: Jetson Orin
#
#   NVIDIA NIM:
#     - nim: PC (x86_64) / DGX Spark (ARM64)
#     - nim-jetson-thor: Jetson Thor
#     - nim-jetson-orin: Jetson Orin (⚠️ Even multi-arch NIM may not work as it expects SBSA)
#
# Usage:
#   # Ollama (PC or DGX Spark)
#   docker compose --profile ollama up
#   docker exec ollama ollama pull llama3.2-vision:11b
#
#   # NVIDIA NIM (PC or DGX Spark)
#   export NGC_API_KEY=<your-key>
#   docker compose --profile nim up
#
# Access:
#   - Live VLM WebUI: https://localhost:8090
#   - Ollama API: http://localhost:11434/v1
#   - NIM API: http://localhost:8000/v1
# ==============================================================================

services:
  # ============================================================================
  # Ollama Service (shared across all ollama-* profiles)
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - ollama
      - ollama-jetson-orin
      - ollama-jetson-thor
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - vlm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Live VLM WebUI - PC (x86_64) / DGX Spark (ARM64) [Multi-arch]
  # ============================================================================
  live-vlm-webui:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest
    container_name: live-vlm-webui
    profiles:
      - ollama
    network_mode: host
    environment:
      # - PYTHONUNBUFFERED=1
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      
      - LIVE_VLM_ENABLE_MULTI_FRAME=${LIVE_VLM_ENABLE_MULTI_FRAME}
      - LIVE_VLM_BUFFER_SIZE=${LIVE_VLM_BUFFER_SIZE}
      - LIVE_VLM_TRIGGER_SIZE=${LIVE_VLM_TRIGGER_SIZE}
      - LIVE_VLM_TARGET_FRAMES=${LIVE_VLM_TARGET_FRAMES}
      - LIVE_VLM_INTERVAL_STEP=${LIVE_VLM_INTERVAL_STEP}
      - LIVE_VLM_SCENE_THRESHOLD=${LIVE_VLM_SCENE_THRESHOLD}

      - LIVE_VLM_WEBHOOK_ENABLED=${LIVE_VLM_WEBHOOK_ENABLED}
      - LIVE_VLM_WEBHOOK_URL=${LIVE_VLM_WEBHOOK_URL}
      - LIVE_VLM_WEBHOOK_TIMEOUT_SEC=${LIVE_VLM_WEBHOOK_TIMEOUT_SEC}
      - LIVE_VLM_WEBHOOK_MODE=${LIVE_VLM_WEBHOOK_MODE}
      - LIVE_VLM_WEBHOOK_SAMPLE_EVERY=${LIVE_VLM_WEBHOOK_SAMPLE_EVERY}
      - LIVE_VLM_WEBHOOK_INCLUDE_METRICS=${LIVE_VLM_WEBHOOK_INCLUDE_METRICS}

      - LIVE_VLM_CAMERA_ID=${LIVE_VLM_CAMERA_ID}
      - LIVE_VLM_STREAM_ID=${LIVE_VLM_STREAM_ID}
      - LIVE_VLM_INFERENCE_PROMPT_ID=${LIVE_VLM_INFERENCE_PROMPT_ID}
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
    # privileged: true
    volumes:
      - ../src/live_vlm_webui:/app/src/live_vlm_webui

  # ============================================================================
  # Live VLM WebUI - Jetson Orin
  # ============================================================================
  live-vlm-webui-jetson-orin:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-orin
    container_name: live-vlm-webui
    profiles:
      - ollama-jetson-orin
    network_mode: host
    privileged: true
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    runtime: nvidia

  # ============================================================================
  # Live VLM WebUI - Jetson Thor
  # ============================================================================
  live-vlm-webui-jetson-thor:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-thor
    container_name: live-vlm-webui
    profiles:
      - ollama-jetson-thor
    network_mode: host
    privileged: true
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ============================================================================
  # NVIDIA NIM - Vision Language Models
  # ============================================================================
  # Supports multiple NIM VLM models via environment variables
  # Default: cosmos-reason1-7b (multi-arch: amd64, arm64)
  # Docs: https://docs.nvidia.com/nim/vision-language-models/
  nim:
    image: ${NIM_IMAGE:-nvcr.io/nim/nvidia/cosmos-reason1-7b:1.4.1}
    container_name: ${NIM_CONTAINER_NAME:-nim-cosmos-reason1-7b}
    profiles:
      - nim
      - nim-jetson-orin
      - nim-jetson-thor
    ports:
      - "8000:8000"
    volumes:
      # Cache downloaded NIM models locally
      - ${HOME}/.cache/nim:/opt/nim/.cache
    environment:
      # Required: NGC API Key (get from https://org.ngc.nvidia.com/setup/api-key)
      - NGC_API_KEY=${NGC_API_KEY}
    shm_size: 32gb
    restart: unless-stopped
    networks:
      - vlm-network
    # GPU configuration
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # NIM takes time to start

  # ============================================================================
  # Live VLM WebUI (NIM) - PC (x86_64) / DGX Spark (ARM64) [Multi-arch]
  # ============================================================================
  live-vlm-webui-nim:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest
    container_name: live-vlm-webui
    profiles:
      - nim
    network_mode: host  # Required for WebRTC
    command: >
      python server.py
      --host 0.0.0.0
      --port 8090
      --ssl-cert cert.pem
      --ssl-key key.pem
      --api-base http://localhost:8000/v1
      --model ${NIM_MODEL_NAME:-nvidia/cosmos-reason1-7b}
      --prompt "Describe what you see in this image in one sentence."
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      nim:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ============================================================================
  # Live VLM WebUI (NIM) - Jetson Orin
  # ============================================================================
  live-vlm-webui-nim-jetson-orin:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-orin
    container_name: live-vlm-webui
    profiles:
      - nim-jetson-orin
    network_mode: host
    privileged: true
    command: >
      python server.py
      --host 0.0.0.0
      --port 8090
      --ssl-cert cert.pem
      --ssl-key key.pem
      --api-base http://localhost:8000/v1
      --model ${NIM_MODEL_NAME:-nvidia/cosmos-reason1-7b}
      --prompt "Describe what you see in this image in one sentence."
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      nim:
        condition: service_healthy
    runtime: nvidia

  # ============================================================================
  # Live VLM WebUI (NIM) - Jetson Thor
  # ============================================================================
  live-vlm-webui-nim-jetson-thor:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-thor
    container_name: live-vlm-webui
    profiles:
      - nim-jetson-thor
    network_mode: host
    privileged: true
    command: >
      python server.py
      --host 0.0.0.0
      --port 8090
      --ssl-cert cert.pem
      --ssl-key key.pem
      --api-base http://localhost:8000/v1
      --model ${NIM_MODEL_NAME:-nvidia/cosmos-reason1-7b}
      --prompt "Describe what you see in this image in one sentence."
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      nim:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ============================================================================
  # Action Webhook Receiver (local demo)
  # ============================================================================
  action-webhook:
    build:
      context: ../services/action-webhook
      dockerfile: Dockerfile
    container_name: action-webhook
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - vlm-network
    environment:
      - ACTION_RULES_ENABLED=${ACTION_RULES_ENABLED}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DEVICE_ENDPOINT_URL=${DEVICE_ENDPOINT_URL}
      - DEVICE_TIMEOUT_SEC=${DEVICE_TIMEOUT_SEC}
      - RISK_THRESHOLD=${RISK_THRESHOLD}
      - ACTION_RULES_FILE=${ACTION_RULES_FILE}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama-data:
    driver: local

networks:
  vlm-network:
    driver: bridge

# ==============================================================================
# Quick Start:
# ==============================================================================
# Option 1: Ollama (Easiest)
#   docker compose --profile ollama up -d
#   docker exec ollama ollama pull llama3.2-vision:11b
#
# Option 2: NVIDIA NIM (Advanced)
#   export NGC_API_KEY=<your-key>
#   docker compose --profile nim up -d
#
# Access Web UI: https://localhost:8090
#
# Stop services:
#   docker compose down
# ==============================================================================

